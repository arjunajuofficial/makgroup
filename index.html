  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e=\"position:fixed;inset:0;background:#04060f;display:grid;place-items:center;overflow:hidden\">\n  <div class=\"stage\" ref=\"{{ stageRef }}\" style=\"--page:#04060f;--bg-grad:radial-gradient(135% 105% at 50% -8%, #1b2d56 0%, #0c1736 44%, #060c20 100%);--ink:#ffffff;--ink-mid:rgba(255,255,255,0.84);--ink-soft:rgba(255,255,255,0.6);--gold:#dcb360;--gold-grad:linear-gradient(180deg,#f7edcb 0%,#e4c478 46%,#caa24e 74%,#f2e2b2 100%);--blue:#2f74d9;--red:#e2453a;--frame-line:rgba(220,179,96,0.28);--plate:rgba(255,255,255,0.96);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:1920px;height:1080px;overflow:hidden;font-family:'Montserrat',sans-serif;background:var(--bg-grad)\">\n\n    <div style=\"position:absolute;top:-180px;left:50%;width:1320px;height:760px;transform:translateX(-50%);background:radial-gradient(closest-side, rgba(47,116,217,0.32), transparent 72%);z-index:0;animation:glowTop 10s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"position:absolute;top:48%;left:50%;width:1040px;height:760px;background:radial-gradient(closest-side, rgba(220,179,96,0.18), transparent 70%);z-index:0;animation:glowPulse 10s ease-in-out infinite\"><\u002Fdiv>\n\n    <canvas ref=\"{{ particlesRef }}\" style=\"position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none\"><\u002Fcanvas>\n\n    <div style=\"position:absolute;inset:46px;border:1px solid var(--frame-line);border-radius:4px;z-index:5;pointer-events:none\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:54px;border:1px solid rgba(220,179,96,0.10);border-radius:2px;z-index:5;pointer-events:none\"><\u002Fdiv>\n    <div style=\"position:absolute;top:40px;left:40px;width:26px;height:26px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);z-index:6\"><\u002Fdiv>\n    <div style=\"position:absolute;top:40px;right:40px;width:26px;height:26px;border-top:2px solid var(--gold);border-right:2px solid var(--gold);z-index:6\"><\u002Fdiv>\n    <div style=\"position:absolute;bottom:40px;left:40px;width:26px;height:26px;border-bottom:2px solid var(--gold);border-left:2px solid var(--gold);z-index:6\"><\u002Fdiv>\n    <div style=\"position:absolute;bottom:40px;right:40px;width:26px;height:26px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);z-index:6\"><\u002Fdiv>\n\n    <div style=\"position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:70px\">\n\n      <div style=\"margin-bottom:42px;filter:drop-shadow(0 10px 34px rgba(41,124,200,0.28))\">\n        <div style=\"position:relative;width:251px;height:200px;perspective:1100px\">\n          <img ref=\"{{ blueRef }}\" src=\"fbf6742f-a405-40d9-8069-3459fdf11baf\" alt=\"\" style=\"position:absolute;inset:0;width:100%;height:100%;transform-origin:center center;backface-visibility:visible;transform:translateX(-160px);will-change:transform\">\n          <img ref=\"{{ redRef }}\" src=\"55d99523-c7f2-4f11-8365-c6c2d8858244\" alt=\"United MakGroup\" style=\"position:absolute;inset:0;width:100%;height:100%;transform-origin:center center;backface-visibility:visible;transform:translateX(160px);will-change:transform\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:25px;letter-spacing:13px;font-weight:600;color:var(--gold);text-transform:uppercase;margin-bottom:4px;animation:fadeUp 1s .1s ease both\">Celebrating Our Anniversary<\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:16px;margin:36px 0 30px;animation:fadeUp 1s .28s ease both\">\n        <span style=\"width:96px;height:2px;background:linear-gradient(90deg,transparent,var(--blue))\"><\u002Fspan>\n        <span style=\"width:12px;height:12px;background:var(--gold);transform:rotate(45deg)\"><\u002Fspan>\n        <span style=\"width:96px;height:2px;background:linear-gradient(90deg,var(--red),transparent)\"><\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"font-size:30px;font-weight:500;letter-spacing:8px;color:var(--ink-mid);text-transform:uppercase;animation:fadeUp 1s .34s ease both\">United MakGroup Technologies<\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:22px;margin-top:42px;font-size:16px;font-weight:600;letter-spacing:4px;color:var(--gold);text-transform:uppercase;animation:fadeUp 1s .5s ease both\">\n      <div style=\"display:flex;align-items:center;gap:22px;margin-top:42px;font-size:16px;font-weight:600;letter-spacing:4px;color:var(--gold);text-transform:uppercase;animation:fadeUp 1s .5s ease both\">\n        <span>Dubai, UAE<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:absolute;bottom:66px;left:50%;transform:translateX(-50%);z-index:4;font-size:15px;letter-spacing:4px;color:var(--ink-soft);font-weight:500\">www.makgroup.ae<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Midnight&quot;,&quot;Ivory&quot;],&quot;default&quot;:&quot;Midnight&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showParticles&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;motionSpeed&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:1,&quot;min&quot;:0.3,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.stageRef = React.createRef();\n    this.particlesRef = React.createRef();\n    this.rootRef = React.createRef();\n    this.blueRef = React.createRef();\n    this.redRef = React.createRef();\n  }\n\n  renderVals(){\n    return { stageRef: this.stageRef, particlesRef: this.particlesRef, rootRef: this.rootRef, blueRef: this.blueRef, redRef: this.redRef };\n  }\n\n  updateLogo(t){\n    const b = this.blueRef.current, r = this.redRef.current;\n    if (!b || !r) return;\n    const T = 10;                       // full cycle length (s)\n    const tc = ((t % T) + T) % T;\n    const apart = 160, spins = 1080;    // 3 full 360 turns\n    const joinDur = 0.85, spinEnd = 3.35, splitStart = 9.15;\n    const eOut = p => 1 - Math.pow(1 - p, 3);\n    const eIn  = p => p * p * p;\n    const eInOut = p => p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2, 3)/2;\n    let off, rot;\n    if (tc < joinDur){ off = apart * (1 - eOut(tc/joinDur)); rot = 0; }\n    else if (tc < spinEnd){ off = 0; rot = eInOut((tc-joinDur)/(spinEnd-joinDur)) * spins; }\n    else if (tc < splitStart){ off = 0; rot = 0; }\n    else { off = apart * eIn((tc-splitStart)/(T-splitStart)); rot = 0; }\n    const s = 1 + 0.02 * Math.sin(t * 0.8);\n    b.style.transform = `translateX(${-off}px) rotateY(${rot}deg) scale(${s})`;\n    r.style.transform = `translateX(${off}px) rotateY(${rot}deg) scale(${s})`;\n  }\n\n  palette(){\n    const t = this.props.theme || 'Midnight';\n    if (t === 'Ivory') return {\n      page:'#e7dfce',\n      bgGrad:'radial-gradient(135% 105% at 50% -8%, #fbf7ee 0%, #efe7d4 50%, #e4d9c0 100%)',\n      ink:'#16233f', inkMid:'rgba(22,35,63,0.82)', inkSoft:'rgba(22,35,63,0.58)',\n      gold:'#b78c39', goldGrad:'linear-gradient(180deg,#26406f 0%,#1b2f55 50%,#16233f 100%)',\n      blue:'#2f74d9', red:'#e2453a', frame:'rgba(22,35,63,0.18)', plate:'transparent',\n      particle:'40,66,122'\n    };\n    return {\n      page:'#04060f',\n      bgGrad:'radial-gradient(135% 105% at 50% -8%, #1b2d56 0%, #0c1736 44%, #060c20 100%)',\n      ink:'#ffffff', inkMid:'rgba(255,255,255,0.84)', inkSoft:'rgba(255,255,255,0.6)',\n      gold:'#dcb360', goldGrad:'linear-gradient(180deg,#f7edcb 0%,#e4c478 46%,#caa24e 74%,#f2e2b2 100%)',\n      blue:'#2f74d9', red:'#e2453a', frame:'rgba(220,179,96,0.28)', plate:'rgba(255,255,255,0.96)',\n      particle:'220,179,96'\n    };\n  }\n\n  applyTheme(){\n    const el = this.stageRef.current;\n    if (!el) return;\n    const p = this.palette();\n    el.style.setProperty('--page', p.page);\n    el.style.setProperty('--bg-grad', p.bgGrad);\n    el.style.setProperty('--ink', p.ink);\n    el.style.setProperty('--ink-mid', p.inkMid);\n    el.style.setProperty('--ink-soft', p.inkSoft);\n    el.style.setProperty('--gold', p.gold);\n    el.style.setProperty('--gold-grad', p.goldGrad);\n    el.style.setProperty('--blue', p.blue);\n    el.style.setProperty('--red', p.red);\n    el.style.setProperty('--frame-line', p.frame);\n    el.style.setProperty('--plate', p.plate);\n    if (el.parentElement) el.parentElement.style.background = p.page;\n    document.body.style.background = p.page;\n    this._pc = p.particle;\n  }\n\n  fit(){\n    const el = this.stageRef.current;\n    if (!el) return;\n    const s = Math.min(window.innerWidth/1920, window.innerHeight/1080);\n    el.style.transform = `translate(-50%,-50%) scale(${s})`;\n  }\n\n  initParticles(){\n    const cv = this.particlesRef.current;\n    if (!cv) return;\n    cv.width = 1920; cv.height = 1080;\n    this._ctx = cv.getContext('2d');\n    this._motes = Array.from({length:46}, () => ({\n      x0: Math.random()*1920,\n      y0: Math.random()*1120,\n      r: Math.random()*2.4 + 0.8,\n      sp: Math.random()*30 + 11,            // px/sec upward\n      driftAmp: Math.random()*26 + 8,\n      driftFreq: Math.random()*0.6 + 0.25,\n      phase: Math.random()*6.28,\n      a: Math.random()*0.4 + 0.12\n    }));\n    this._t0 = performance.now();\n    const loop = () => {\n      this._raf = requestAnimationFrame(loop);\n      const t = this._exporting\n        ? this._seekT\n        : ((performance.now() - this._t0) / 1000) * (this.props.motionSpeed ?? 1);\n      this.drawParticles(t);\n      this.updateLogo(t);\n    };\n    loop();\n  }\n\n  drawParticles(t){\n    const ctx = this._ctx;\n    if (!ctx) return;\n    ctx.clearRect(0, 0, 1920, 1080);\n    if (this.props.showParticles === false) return;\n    const rgb = this._pc || '220,179,96';\n    const period = 1120;\n    for (const m of this._motes){\n      let y = ((m.y0 - m.sp * t) % period + period) % period - 20;\n      const x = m.x0 + m.driftAmp * Math.sin(m.driftFreq * t + m.phase);\n      ctx.beginPath();\n      ctx.fillStyle = `rgba(${rgb},${m.a})`;\n      ctx.shadowBlur = 8;\n      ctx.shadowColor = `rgba(${rgb},${m.a})`;\n      ctx.arc(x, y, m.r, 0, 6.2832);\n      ctx.fill();\n    }\n  }\n\n  seekTo(time){\n    this._exporting = true;\n    this._seekT = time;\n    const root = this.rootRef.current;\n    if (root && root.getAnimations){\n      root.getAnimations({subtree:true}).forEach(a => {\n        a.pause();\n        if (a.animationName === 'fadeUp'){\n          a.currentTime = a.effect.getComputedTiming().endTime;   // hold entrance complete\n        } else {\n          a.currentTime = time * 1000;\n        }\n      });\n    }\n    this.drawParticles(time);\n    this.updateLogo(time);\n  }\n\n  componentDidMount(){\n    this._fit = () => this.fit();\n    window.addEventListener('resize', this._fit);\n    this.applyTheme();\n    this.fit();\n    this.initParticles();\n    this._onSeek = (e) => { if (e && e.detail) this.seekTo(e.detail.time || 0); };\n    if (this.rootRef.current) this.rootRef.current.addEventListener('data-om-seek-to-time-frame', this._onSeek);\n  }\n\n  componentDidUpdate(prev){\n    if (prev.theme !== this.props.theme) this.applyTheme();\n  }\n\n  componentWillUnmount(){\n    window.removeEventListener('resize', this._fit);\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this.rootRef.current && this._onSeek) this.rootRef.current.removeEventListener('data-om-seek-to-time-frame', this._onSeek);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fdiv><\u002Fx-dc><\u002Fbody><\u002Fhtml>"
  </script>
